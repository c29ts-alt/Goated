<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRISM — Stock Portfolio Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg-void: #080a0e;
    --bg-surface: #0d1117;
    --bg-card: #111620;
    --bg-elevated: #171e2b;
    --border: #1e2a3a;
    --border-bright: #2a3a52;
    --text-primary: #e8edf5;
    --text-secondary: #7a8fa8;
    --text-muted: #3d5068;
    --accent: #3b82f6;
    --accent-dim: #1d3a6e;
    --accent-glow: rgba(59,130,246,0.15);
    --green: #10b981;
    --green-dim: #0d3d2a;
    --red: #ef4444;
    --red-dim: #3d1212;
    --amber: #f59e0b;
    --amber-dim: #3d2a06;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  html { font-size: 14px; background: var(--bg-void); color: var(--text-primary); font-family: var(--sans); }
  body { min-height: 100vh; display: flex; flex-direction: column; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

  /* LAYOUT */
  .shell { display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar {
    width: 220px; min-width: 220px; background: var(--bg-surface);
    border-right: 1px solid var(--border); display: flex; flex-direction: column;
    padding: 0; overflow: hidden;
  }
  .logo {
    padding: 24px 20px 20px;
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    font-family: var(--mono); font-size: 18px; letter-spacing: 4px;
    color: var(--accent); font-weight: 700; display: block;
  }
  .logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 2px; }

  .nav { padding: 12px 10px; flex: 1; }
  .nav-section { margin-bottom: 20px; }
  .nav-label { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; padding: 0 10px; margin-bottom: 6px; display: block; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 6px; cursor: pointer;
    color: var(--text-secondary); font-size: 13px; font-weight: 400;
    transition: all 0.15s; border: 1px solid transparent; margin-bottom: 1px;
    font-family: var(--sans);
  }
  .nav-item:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-glow); border-color: var(--accent-dim); color: var(--accent); }
  .nav-item svg { width: 14px; height: 14px; flex-shrink: 0; }

  .sidebar-footer {
    padding: 14px 16px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--text-muted); font-family: var(--mono);
  }
  .market-status { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }

  /* MAIN AREA */
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  /* TOPBAR */
  .topbar {
    height: 56px; background: var(--bg-surface); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; padding: 0 24px; flex-shrink: 0;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .page-title { font-size: 15px; font-weight: 500; color: var(--text-primary); }
  .page-date { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .topbar-right { display: flex; align-items: center; gap: 10px; }
  .btn {
    display: flex; align-items: center; gap: 6px; padding: 6px 14px;
    background: transparent; border: 1px solid var(--border-bright); border-radius: 6px;
    color: var(--text-secondary); font-size: 12px; cursor: pointer; font-family: var(--sans);
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { background: #2563eb; }

  /* CONTENT */
  .content { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }

  /* KPI ROW */
  .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .kpi-card {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px; position: relative; overflow: hidden;
  }
  .kpi-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-dim), transparent);
  }
  .kpi-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
  .kpi-value { font-family: var(--mono); font-size: 24px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
  .kpi-change { font-size: 11px; font-family: var(--mono); display: flex; align-items: center; gap: 4px; }
  .up { color: var(--green); }
  .down { color: var(--red); }
  .neutral { color: var(--text-muted); }

  /* TWO-COL GRID */
  .two-col { display: grid; grid-template-columns: 1fr 340px; gap: 20px; }

  /* PANEL */
  .panel {
    background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .panel-header {
    padding: 16px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-title { font-size: 12px; font-weight: 500; color: var(--text-primary); letter-spacing: 1px; text-transform: uppercase; }
  .panel-sub { font-size: 11px; color: var(--text-muted); font-family: var(--mono); }
  .panel-actions { display: flex; gap: 6px; }
  .chip {
    padding: 3px 10px; border-radius: 4px; font-size: 10px; font-family: var(--mono);
    border: 1px solid var(--border); color: var(--text-muted); cursor: pointer;
    transition: all 0.12s;
  }
  .chip:hover, .chip.active { border-color: var(--accent); color: var(--accent); background: var(--accent-glow); }

  /* PORTFOLIO TABLE */
  .portfolio-table { width: 100%; border-collapse: collapse; }
  .portfolio-table th {
    font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
    color: var(--text-muted); padding: 10px 20px; text-align: left;
    border-bottom: 1px solid var(--border); font-family: var(--sans); font-weight: 500;
    background: var(--bg-surface);
  }
  .portfolio-table th:last-child, .portfolio-table td:last-child { text-align: right; }
  .portfolio-table td { padding: 13px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .portfolio-table tr:last-child td { border-bottom: none; }
  .portfolio-table tr { transition: background 0.1s; }
  .portfolio-table tr:hover td { background: var(--bg-elevated); }

  .ticker { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text-primary); }
  .company-name { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .price-cell { font-family: var(--mono); font-size: 13px; color: var(--text-primary); }
  .change-badge {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 8px; border-radius: 4px; font-family: var(--mono); font-size: 11px; font-weight: 700;
  }
  .change-badge.up { background: var(--green-dim); color: var(--green); }
  .change-badge.down { background: var(--red-dim); color: var(--red); }
  .shares-cell { font-family: var(--mono); font-size: 12px; color: var(--text-secondary); }
  .pnl-cell { font-family: var(--mono); font-size: 12px; }

  /* MINI SPARKLINE */
  .sparkline { width: 80px; height: 30px; }

  /* WATCHLIST */
  .watchlist-item {
    padding: 12px 20px; display: flex; align-items: center; border-bottom: 1px solid var(--border);
    gap: 12px; cursor: pointer; transition: background 0.1s;
  }
  .watchlist-item:last-child { border-bottom: none; }
  .watchlist-item:hover { background: var(--bg-elevated); }
  .wl-ticker { font-family: var(--mono); font-size: 13px; font-weight: 700; color: var(--text-primary); width: 52px; }
  .wl-name { font-size: 11px; color: var(--text-muted); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .wl-price { font-family: var(--mono); font-size: 12px; color: var(--text-primary); text-align: right; min-width: 60px; }
  .wl-change { font-family: var(--mono); font-size: 11px; min-width: 52px; text-align: right; }

  /* CHART AREA */
  .chart-wrap { padding: 20px; }
  .chart-svg { width: 100%; height: 180px; }

  /* ALLOCATION BAR */
  .alloc-bar-wrap { padding: 20px; }
  .alloc-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .alloc-ticker { font-family: var(--mono); font-size: 11px; color: var(--text-secondary); width: 40px; }
  .alloc-bar-bg { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .alloc-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .alloc-pct { font-family: var(--mono); font-size: 11px; color: var(--text-muted); width: 36px; text-align: right; }

  /* AI PANEL */
  .ai-panel { background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .ai-panel-header {
    padding: 14px 20px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 10px;
  }
  .ai-badge {
    padding: 2px 8px; background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 4px; font-size: 9px; font-family: var(--mono); color: var(--accent); letter-spacing: 1px;
  }
  .ai-body { padding: 16px 20px; }
  .ai-prompt-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .ai-input {
    flex: 1; background: var(--bg-elevated); border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 8px 12px; color: var(--text-primary); font-family: var(--sans);
    font-size: 13px; outline: none; transition: border-color 0.15s;
  }
  .ai-input:focus { border-color: var(--accent); }
  .ai-input::placeholder { color: var(--text-muted); }
  .ai-submit {
    padding: 8px 14px; background: var(--accent); border: none; border-radius: 6px;
    color: #fff; font-family: var(--sans); font-size: 12px; cursor: pointer; white-space: nowrap;
    transition: background 0.15s;
  }
  .ai-submit:hover { background: #2563eb; }
  .ai-submit:disabled { background: var(--accent-dim); color: var(--text-muted); cursor: not-allowed; }
  .ai-response {
    background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 6px;
    padding: 12px 14px; font-size: 12px; line-height: 1.7; color: var(--text-secondary);
    min-height: 80px; font-family: var(--sans);
  }
  .ai-typing { display: inline-block; }
  .ai-typing::after { content: '▋'; animation: blink 0.8s step-start infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  /* ADD STOCK MODAL */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg-card); border: 1px solid var(--border-bright); border-radius: 12px;
    padding: 28px; width: 400px;
  }
  .modal h2 { font-size: 16px; font-weight: 500; margin-bottom: 20px; color: var(--text-primary); }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px; }
  .form-input {
    width: 100%; background: var(--bg-elevated); border: 1px solid var(--border-bright);
    border-radius: 6px; padding: 9px 12px; color: var(--text-primary); font-family: var(--mono);
    font-size: 13px; outline: none;
  }
  .form-input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }

  /* TABS */
  .tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 20px; }
  .tab {
    padding: 12px 16px; font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted); cursor: pointer; border-bottom: 2px solid transparent;
    margin-bottom: -1px; transition: all 0.15s; font-weight: 500;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* SECTOR TAG */
  .sector-tag {
    display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 9px;
    background: var(--bg-elevated); border: 1px solid var(--border); color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  /* SCROLLABLE TABLE */
  .table-scroll { overflow-x: auto; }
</style>
</head>
<body>
<div class="shell">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <span class="logo-mark">PRISM</span>
    <span class="logo-sub">Portfolio Intelligence</span>
  </div>
  <nav class="nav">
    <div class="nav-section">
      <span class="nav-label">Overview</span>
      <div class="nav-item active" onclick="switchView('portfolio')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="2" width="5" height="5" rx="1"/><rect x="9" y="2" width="5" height="5" rx="1"/><rect x="2" y="9" width="5" height="5" rx="1"/><rect x="9" y="9" width="5" height="5" rx="1"/></svg>
        Portfolio
      </div>
      <div class="nav-item" onclick="switchView('watchlist')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2l1.5 3 3.5.5-2.5 2.5.6 3.5L8 10l-3.1 1.5.6-3.5L3 5.5l3.5-.5z"/></svg>
        Watchlist
      </div>
      <div class="nav-item" onclick="switchView('prospect')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4"/><path d="M10.5 10.5L14 14"/></svg>
        Prospect
      </div>
    </div>
    <div class="nav-section">
      <span class="nav-label">Analyze</span>
      <div class="nav-item" onclick="switchView('ai')">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 2C5 2 3 4 3 7c0 1.5.6 2.8 1.5 3.7L4 14h8l-.5-3.3C12.4 9.8 13 8.5 13 7c0-3-2-5-5-5z"/><path d="M5.5 14v1M10.5 14v1"/></svg>
        AI Analysis
      </div>
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="market-status"><div class="dot"></div><span>Market Open</span></div>
    <div id="clock" style="color:var(--text-muted);font-size:10px;">--:--:-- ET</div>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="page-title" id="page-title">Portfolio Overview</span>
      <span class="page-date" id="page-date"></span>
    </div>
    <div class="topbar-right">
      <button class="btn" onclick="refreshPrices()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1 4l2.5 2.5L6 4M3.5 6.5A6 6 0 1 1 2 10"/></svg>
        Refresh
      </button>
      <button class="btn primary" onclick="openModal()">+ Add Stock</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content" id="content">
    <!-- Dynamic content rendered by JS -->
  </div>
</main>
</div>

<!-- ADD STOCK MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Add Position</h2>
    <div class="form-group">
      <label class="form-label">Ticker Symbol</label>
      <input class="form-input" id="add-ticker" placeholder="AAPL" style="text-transform:uppercase;">
    </div>
    <div class="form-group">
      <label class="form-label">Company Name</label>
      <input class="form-input" id="add-name" placeholder="Apple Inc.">
    </div>
    <div class="form-group">
      <label class="form-label">Shares</label>
      <input class="form-input" id="add-shares" type="number" placeholder="100">
    </div>
    <div class="form-group">
      <label class="form-label">Avg Cost / Share ($)</label>
      <input class="form-input" id="add-cost" type="number" placeholder="150.00">
    </div>
    <div class="form-group">
      <label class="form-label">Sector</label>
      <input class="form-input" id="add-sector" placeholder="Technology">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addStock()">Add Position</button>
    </div>
  </div>
</div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let portfolio = [
  { ticker:'AAPL', name:'Apple Inc.', shares:25, cost:142.50, price:213.49, sector:'Technology', color:'#3b82f6' },
  { ticker:'NVDA', name:'NVIDIA Corp.', shares:10, cost:480.00, price:875.39, sector:'Technology', color:'#10b981' },
  { ticker:'MSFT', name:'Microsoft Corp.', shares:15, cost:290.00, price:420.11, sector:'Technology', color:'#8b5cf6' },
  { ticker:'JPM',  name:'JPMorgan Chase', shares:20, cost:175.00, price:234.56, sector:'Financials', color:'#f59e0b' },
  { ticker:'UNH',  name:'UnitedHealth Group', shares:8, cost:520.00, price:491.23, sector:'Healthcare', color:'#ef4444' },
];

let watchlist = [
  { ticker:'TSLA', name:'Tesla Inc.', price:182.45, change:2.31, pct:1.28 },
  { ticker:'GOOGL', name:'Alphabet Inc.', price:178.92, change:-1.44, pct:-0.80 },
  { ticker:'AMZN', name:'Amazon.com Inc.', price:204.67, change:3.12, pct:1.55 },
  { ticker:'META', name:'Meta Platforms', price:536.28, change:8.90, pct:1.69 },
  { ticker:'BRK.B', name:'Berkshire Hathaway', price:455.01, change:-2.10, pct:-0.46 },
  { ticker:'VTI',  name:'Vanguard Total Mkt ETF', price:270.33, change:1.05, pct:0.39 },
];

let prospects = [
  { ticker:'PLTR', name:'Palantir Technologies', price:24.58, upside:'+18%', rating:'Strong Buy', note:'AI data platform, growing gov contracts' },
  { ticker:'COIN', name:'Coinbase Global', price:228.14, upside:'+25%', rating:'Buy', note:'Crypto exchange leader, improving margins' },
  { ticker:'RDDT', name:'Reddit Inc.', price:119.45, upside:'+30%', rating:'Buy', note:'AI licensing deals, improving ad revenue' },
  { ticker:'ARM',  name:'ARM Holdings', price:131.02, upside:'+15%', rating:'Neutral', note:'Chip IP dominance, premium valuation' },
];

let currentView = 'portfolio';

// Simulate small price fluctuations
function fuzz(p) { return +(p * (1 + (Math.random()-0.5)*0.008)).toFixed(2); }

// Generate fake sparkline path
function sparkPath(w, h, up) {
  const pts = [];
  let v = h*0.5;
  for(let i=0; i<=10; i++) {
    v += (Math.random()-0.45)*(h*0.15) * (up ? 0.9 : 1.1);
    v = Math.max(4, Math.min(h-4, v));
    pts.push([i*(w/10), v]);
  }
  return 'M'+pts.map(p=>p[0]+','+p[1]).join(' L');
}

// ─── CLOCK ───────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const et = new Date(now.toLocaleString('en-US', {timeZone:'America/New_York'}));
  document.getElementById('clock').textContent =
    et.toTimeString().slice(0,8) + ' ET';
}
setInterval(updateClock, 1000); updateClock();

document.getElementById('page-date').textContent =
  new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric', year:'numeric'});

// ─── PORTFOLIO CALCS ─────────────────────────────────────────────────────────
function totalValue() { return portfolio.reduce((s,p)=>s+p.price*p.shares,0); }
function totalCost()  { return portfolio.reduce((s,p)=>s+p.cost*p.shares,0); }
function totalPnL()   { return totalValue()-totalCost(); }
function totalPct()   { return (totalPnL()/totalCost()*100); }
function fmt(n,d=2)   { return n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}); }
function fmtM(n)      { return n>=1e6?'$'+fmt(n/1e6,2)+'M':'$'+fmt(n,0); }

// ─── SPARKLINE SVG ───────────────────────────────────────────────────────────
function svgSpark(up, color) {
  const path = sparkPath(80, 30, up);
  const endPts = path.split(' L');
  const last = endPts[endPts.length-1].split(',');
  return `<svg class="sparkline" viewBox="0 0 80 30" xmlns="http://www.w3.org/2000/svg">
    <path d="${path}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="${last[0]}" cy="${last[1]}" r="2.5" fill="${color}"/>
  </svg>`;
}

// ─── PORTFOLIO VIEW ───────────────────────────────────────────────────────────
function renderPortfolio() {
  document.getElementById('page-title').textContent = 'Portfolio Overview';
  const tv = totalValue(), tp = totalPnL(), tpct = totalPct(), tc = totalCost();
  const isUp = tp >= 0;

  const kpis = `<div class="kpi-row">
    <div class="kpi-card">
      <div class="kpi-label">Total Value</div>
      <div class="kpi-value">$${fmt(tv)}</div>
      <div class="kpi-change ${isUp?'up':'down'}">${isUp?'▲':'▼'} ${Math.abs(tpct).toFixed(2)}% all time</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Total P&L</div>
      <div class="kpi-value ${isUp?'up':'down'}">${isUp?'+':'-'}$${fmt(Math.abs(tp))}</div>
      <div class="kpi-change neutral">Cost basis $${fmt(tc)}</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Positions</div>
      <div class="kpi-value">${portfolio.length}</div>
      <div class="kpi-change neutral">Across ${[...new Set(portfolio.map(p=>p.sector))].length} sectors</div>
    </div>
    <div class="kpi-card">
      <div class="kpi-label">Best Performer</div>
      ${(() => {
        const best = portfolio.reduce((a,b)=>((b.price-b.cost)/b.cost>(a.price-a.cost)/a.cost)?b:a);
        const pct = (best.price-best.cost)/best.cost*100;
        return `<div class="kpi-value up">${best.ticker}</div>
        <div class="kpi-change up">▲ ${pct.toFixed(1)}%</div>`;
      })()}
    </div>
  </div>`;

  const rows = portfolio.map(p => {
    const pnl = (p.price - p.cost) * p.shares;
    const pct = (p.price - p.cost) / p.cost * 100;
    const isUp = pnl >= 0;
    const dayChg = (Math.random()-0.48)*2;
    const dayUp = dayChg >= 0;
    return `<tr>
      <td>
        <div class="ticker">${p.ticker}</div>
        <div class="company-name">${p.name}</div>
      </td>
      <td><span class="sector-tag">${p.sector}</span></td>
      <td>${svgSpark(isUp, isUp ? 'var(--green)' : 'var(--red)')}</td>
      <td class="price-cell">$${fmt(p.price)}</td>
      <td>
        <span class="change-badge ${dayUp?'up':'down'}">${dayUp?'▲':'▼'} ${Math.abs(dayChg).toFixed(2)}%</span>
      </td>
      <td class="shares-cell">${p.shares} sh<br><span style="color:var(--text-muted);font-size:10px;">@ $${fmt(p.cost)}</span></td>
      <td>$${fmt(p.price*p.shares)}</td>
      <td class="pnl-cell ${isUp?'up':'down'}">
        ${isUp?'+':'-'}$${fmt(Math.abs(pnl))}<br>
        <span style="font-size:10px">${isUp?'+':''}${pct.toFixed(1)}%</span>
      </td>
      <td><button class="btn" onclick="removePosition('${p.ticker}')" style="padding:3px 8px;font-size:10px;color:var(--red);border-color:var(--red-dim);">Remove</button></td>
    </tr>`;
  }).join('');

  const table = `<div class="panel">
    <div class="panel-header">
      <span class="panel-title">Holdings</span>
      <div class="panel-actions">
        <span class="chip active">All</span>
        <span class="chip">Tech</span>
        <span class="chip">Finance</span>
      </div>
    </div>
    <div class="table-scroll">
      <table class="portfolio-table">
        <thead><tr>
          <th>Ticker</th><th>Sector</th><th>Trend</th><th>Price</th>
          <th>Day Chg</th><th>Position</th><th>Value</th><th>P&L</th><th></th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;

  // Allocation bars
  const allocBars = portfolio.map(p => {
    const pct = (p.price*p.shares/totalValue()*100);
    return `<div class="alloc-row">
      <span class="alloc-ticker">${p.ticker}</span>
      <div class="alloc-bar-bg"><div class="alloc-bar-fill" style="width:${pct.toFixed(1)}%;background:${p.color}"></div></div>
      <span class="alloc-pct">${pct.toFixed(0)}%</span>
    </div>`;
  }).join('');

  const sidebar = `<div class="panel">
    <div class="panel-header"><span class="panel-title">Allocation</span></div>
    <div class="alloc-bar-wrap">${allocBars}</div>
  </div>`;

  document.getElementById('content').innerHTML = `
    ${kpis}
    ${table}
    <div class="two-col">
      <div>${renderAIPanel()}</div>
      <div>${sidebar}</div>
    </div>
  `;
  bindAI();
}

// ─── WATCHLIST VIEW ───────────────────────────────────────────────────────────
function renderWatchlist() {
  document.getElementById('page-title').textContent = 'Watchlist';
  const items = watchlist.map(w => `
    <div class="watchlist-item">
      <span class="wl-ticker">${w.ticker}</span>
      <span class="wl-name">${w.name}</span>
      ${svgSpark(w.change>=0, w.change>=0?'var(--green)':'var(--red)')}
      <span class="wl-price">$${fmt(w.price)}</span>
      <span class="wl-change ${w.change>=0?'up':'down'}">${w.change>=0?'+':''}${w.pct.toFixed(2)}%</span>
    </div>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div class="panel" style="max-width:680px">
      <div class="panel-header">
        <span class="panel-title">Watchlist</span>
        <span class="panel-sub">${watchlist.length} securities</span>
      </div>
      ${items}
    </div>
    <div style="max-width:680px">${renderAIPanel()}</div>
  `;
  bindAI();
}

// ─── PROSPECT VIEW ────────────────────────────────────────────────────────────
function renderProspect() {
  document.getElementById('page-title').textContent = 'Prospect Stocks';
  const cards = prospects.map(p => `
    <div class="panel" style="padding:20px;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;">
        <div>
          <div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--text-primary);">${p.ticker}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${p.name}</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:var(--mono);font-size:16px;color:var(--text-primary);">$${fmt(p.price)}</div>
          <div style="font-size:11px;color:var(--green);font-family:var(--mono);margin-top:2px;">${p.upside} upside</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <span style="font-size:10px;color:var(--text-muted);background:var(--bg-elevated);border:1px solid var(--border);padding:2px 8px;border-radius:4px;">${p.rating}</span>
        ${svgSpark(true, 'var(--accent)')}
      </div>
      <div style="font-size:12px;color:var(--text-secondary);line-height:1.6;">${p.note}</div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <button class="btn" onclick="aiResearch('${p.ticker}')" style="font-size:11px;padding:5px 12px;">AI Research ↗</button>
        <button class="btn primary" style="font-size:11px;padding:5px 12px;" onclick="promptAdd('${p.ticker}','${p.name}',${p.price})">+ Add to Portfolio</button>
      </div>
    </div>
  `).join('');

  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;">${cards}</div>
    ${renderAIPanel()}
  `;
  bindAI();
}

// ─── AI VIEW ─────────────────────────────────────────────────────────────────
function renderAIView() {
  document.getElementById('page-title').textContent = 'AI Analysis';
  document.getElementById('content').innerHTML = `
    <div style="max-width:720px">${renderAIPanel(true)}</div>
  `;
  bindAI(true);
}

// ─── AI PANEL ────────────────────────────────────────────────────────────────
function renderAIPanel(large=false) {
  return `<div class="ai-panel">
    <div class="ai-panel-header">
      <span class="panel-title">AI Analysis</span>
      <span class="ai-badge">CLAUDE</span>
    </div>
    <div class="ai-body">
      <div class="ai-prompt-row">
        <input class="ai-input" id="ai-input" placeholder="Ask about your portfolio, a stock, or market trends…" ${large?'style="font-size:14px;padding:10px 14px;"':''}>
        <button class="ai-submit" id="ai-btn" onclick="runAI()">Analyze ↗</button>
      </div>
      ${large?`<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
        ${['Analyze my portfolio risk','Which positions should I trim?','Best opportunities this week','Compare AAPL vs MSFT'].map(q=>`<span class="chip" onclick="document.getElementById('ai-input').value='${q}';runAI()">${q}</span>`).join('')}
      </div>`:''}
      <div class="ai-response" id="ai-response" style="color:var(--text-muted);font-style:italic;">
        Ask a question about your portfolio, specific stocks, or market conditions.
      </div>
    </div>
  </div>`;
}

function bindAI(large=false) {
  const inp = document.getElementById('ai-input');
  if(inp) inp.addEventListener('keydown', e => { if(e.key==='Enter') runAI(); });
}

async function runAI() {
  const inp = document.getElementById('ai-input');
  const btn = document.getElementById('ai-btn');
  const resp = document.getElementById('ai-response');
  const q = inp ? inp.value.trim() : '';
  if(!q) return;

  btn.disabled = true; btn.textContent = '...';
  resp.innerHTML = '<span class="ai-typing">Analyzing</span>';

  const portfolioContext = portfolio.map(p => {
    const pnl = ((p.price-p.cost)/p.cost*100).toFixed(1);
    return `${p.ticker} (${p.name}): ${p.shares} shares @ $${p.cost} avg, current $${p.price}, P&L: ${pnl}%`;
  }).join('\n');

  const watchCtx = watchlist.map(w=>`${w.ticker}: $${w.price} (${w.change>=0?'+':''}${w.pct.toFixed(2)}% today)`).join(', ');

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: `You are PRISM, a sharp, analytical stock portfolio AI assistant. Be concise, data-driven, and direct. Use bullet points sparingly. Give specific, actionable insights. The user's portfolio:\n\n${portfolioContext}\n\nWatchlist: ${watchCtx}\n\nToday's date: ${new Date().toDateString()}. Keep responses under 200 words unless asked for more detail.`,
        messages: [{ role: 'user', content: q }]
      })
    });
    const data = await res.json();
    const text = data.content?.[0]?.text || 'No response.';
    resp.innerHTML = text.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  } catch(e) {
    resp.innerHTML = `<span style="color:var(--red)">Error: ${e.message}. Check your API key or network.</span>`;
  }
  btn.disabled = false; btn.textContent = 'Analyze ↗';
}

function aiResearch(ticker) {
  switchView('ai');
  setTimeout(() => {
    const inp = document.getElementById('ai-input');
    if(inp) { inp.value = `Give me a deep analysis of ${ticker}: business model, recent performance, risks, and whether it's worth investing now.`; runAI(); }
  }, 100);
}

// ─── NAVIGATION ──────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const idx = ['portfolio','watchlist','prospect','ai'].indexOf(view);
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
  if(view==='portfolio') renderPortfolio();
  else if(view==='watchlist') renderWatchlist();
  else if(view==='prospect') renderProspect();
  else renderAIView();
}

// ─── MODAL ────────────────────────────────────────────────────────────────────
function openModal() { document.getElementById('modal').classList.add('open'); }
function closeModal() { document.getElementById('modal').classList.remove('open'); }

function promptAdd(ticker, name, price) {
  document.getElementById('add-ticker').value = ticker;
  document.getElementById('add-name').value = name;
  document.getElementById('add-cost').value = price;
  openModal();
}

function addStock() {
  const ticker = document.getElementById('add-ticker').value.toUpperCase().trim();
  const name   = document.getElementById('add-name').value.trim();
  const shares = parseFloat(document.getElementById('add-shares').value);
  const cost   = parseFloat(document.getElementById('add-cost').value);
  const sector = document.getElementById('add-sector').value.trim() || 'Other';
  if(!ticker||!name||!shares||!cost) return;
  const colors = ['#3b82f6','#10b981','#8b5cf6','#f59e0b','#ef4444','#06b6d4','#f97316'];
  portfolio.push({ ticker, name, shares, cost, price: cost*(1+(Math.random()-0.3)*0.15), sector, color: colors[portfolio.length%colors.length] });
  closeModal();
  switchView(currentView);
}

function removePosition(ticker) {
  portfolio = portfolio.filter(p => p.ticker !== ticker);
  renderPortfolio();
}

function refreshPrices() {
  portfolio.forEach(p => { p.price = fuzz(p.price); });
  watchlist.forEach(w => { w.price = fuzz(w.price); const d = (Math.random()-0.48)*3; w.change=+d.toFixed(2); w.pct=+(d/w.price*100).toFixed(2); });
  switchView(currentView);
}

// Click outside modal to close
document.getElementById('modal').addEventListener('click', e => {
  if(e.target === document.getElementById('modal')) closeModal();
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderPortfolio();
</script>
</body>
</html>
